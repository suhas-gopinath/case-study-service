spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Config
jwt.secret=MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
jwt.expiration=3600000

# CORS Config
app.cors.allowed-mf1=http://localhost:3000
app.cors.allowed-mf2=http://localhost:3001
app.cors.allowed-mf-container=http://localhost:8080
app.cors.allowed-nginx=http://localhost:80

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Refresh Token Configuration
refresh.token.ttl=604800000

# Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.userDatabase.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.userDatabase.wait-duration-in-open-state=30000
resilience4j.circuitbreaker.instances.userDatabase.sliding-window-size=10
resilience4j.circuitbreaker.instances.userDatabase.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.userDatabase.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.userDatabase.automatic-transition-from-open-to-half-open-enabled=true

# Timeout configuration
resilience4j.timelimiter.instances.userDatabase.timeout-duration=3s
resilience4j.circuitbreaker.instances.userDatabase.record-exceptions=org.springframework.dao.DataAccessException,java.util.concurrent.TimeoutException

# Rate Limiter Configuration
resilience4j.ratelimiter.instances.globalRateLimiter.limitForPeriod=100
resilience4j.ratelimiter.instances.globalRateLimiter.limitRefreshPeriod=60s
resilience4j.ratelimiter.instances.globalRateLimiter.timeoutDuration=0s

# Disable security auto-configuration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Hikari connection pool
spring.datasource.hikari.maximum-pool-size=10
